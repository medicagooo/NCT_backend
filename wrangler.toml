name = "nct-backend"
main = "src/index.ts"
compatibility_date = "2026-04-20"
workers_dev = true
routes = [
  { pattern = "testbk.medicago.top", custom_domain = true }
]

[observability.logs]
enabled = true

# Runtime variables are intentionally not declared in [vars].
# Set them in Cloudflare Variables / Secrets so Git-based deploys do not overwrite them.

[[d1_databases]]
binding = "DB"
database_name = "nct-backend"
database_id = "1f06edb3-c56a-4bf1-88bd-7402e0dc344e"
migrations_dir = "./migrations"

[triggers]
crons = ["*/30 * * * *", "* * * * *"]
